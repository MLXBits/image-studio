name: Release

# Push a version tag (vX.Y.Z) to build, sign, notarize, and publish a GitHub
# release with a Developer ID DMG. The tag name is the source of truth for the
# release version. See release flow in README / plan:
#   git tag vX.Y.Z && git push all vX.Y.Z
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      SCHEME: "MLXBits Image Studio"
      APP_NAME: "MLXBits Image Studio"
      PROJECT: "MLXBits Image Studio.xcodeproj"
      GH_REPO: "MLXBits/image-studio"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

    steps:
      - name: Checkout (full history for build number)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"
          echo "Releasing $GITHUB_REF_NAME (version $VERSION, build $(git rev-list --count HEAD))"

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Let codesign use the imported key without an interactive prompt.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Prepend our keychain to the search list so xcodebuild finds the cert.
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$CERT_PATH"
          echo "Imported signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive (Release, manual Developer ID signing)
        run: |
          mkdir -p build
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath "build/archive.xcarchive" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            -quiet

      - name: Export archive with Developer ID
        run: |
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${DEVELOPMENT_TEAM}</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "build/archive.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "build/ExportOptions.plist"

      - name: Create DMG
        run: |
          DMG_PATH="build/${APP_NAME// /_}_${VERSION}.dmg"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

          STAGING="build/dmg_staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "build/export/$APP_NAME.app" "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -quiet \
            "$DMG_PATH"
          rm -rf "$STAGING"
          echo "Created $DMG_PATH"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$DEVELOPMENT_TEAM" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Build release notes
        run: |
          NOTES_FILE="build/notes.md"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          {
            echo "## What's Changed"
            echo
            git log --no-merges --invert-grep --grep="^chore: release " \
              --pretty=format:"- %s ([\`%h\`](https://github.com/${GH_REPO}/commit/%H))" \
              "${PREV_TAG:+$PREV_TAG..}HEAD"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GH_REPO}/compare/${PREV_TAG}...${TAG}"
            fi
          } > "$NOTES_FILE"
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        run: |
          if gh release view "$TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_PATH" -R "$GH_REPO" --clobber
            echo "Release already existed; DMG uploaded."
          else
            gh release create "$TAG" "$DMG_PATH" \
              -R "$GH_REPO" \
              --title "$TAG" \
              --verify-tag \
              --notes-file "$NOTES_FILE"
          fi
