name: MLXBits Image Studio
options:
  bundleIdPrefix: com.mlxbits
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.6.2"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    # Team only on Release so Debug builds stay unsigned/adhoc and don't
    # require a provisioning round-trip. release.sh archives Release.
    # Replace XXXXXXXXXX with your Apple Developer Team ID (10-char string from
    # developer.apple.com → Membership). Only needed to build a signed release.
    Release:
      DEVELOPMENT_TEAM: XXXXXXXXXX

targets:
  MLXBits Image Studio:
    type: application
    platform: macOS
    # Explicit source dirs only — `path: .` swept build artifacts, tooling
    # configs (.swiftlint.yml/.periphery.yml/.jscpd.json), reports, logs, and
    # the built .app/.dmg into the app bundle (dotfile-blind `*.yml` excludes).
    # Info.plist + entitlements are wired via the `info:`/`entitlements:` keys.
    sources:
      - App
      - Models
      - Runner
      - Stores
      - Utilities
      - path: Views
        excludes:
          - ".swiftlint.yml"
      - path: Resources/ideogram_caption_prompt.md
        buildPhase: resources
      - path: Resources/mflux_driver.py
        buildPhase: resources
      - path: Resources/scenario_prompt.md
        buildPhase: resources
      - path: Resources/scenario_llm_driver.py
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: MLXBits Image Studio
        CFBundleIdentifier: com.mlxbits.image-studio
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    entitlements:
      path: Resources/MLXBits_Image_Studio.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    preBuildScripts:
      - name: SwiftFormat
        script: |
          SWIFTFORMAT=/opt/homebrew/bin/swiftformat
          if [ -f "$SWIFTFORMAT" ]; then
            "$SWIFTFORMAT" --config "${SRCROOT}/.swiftformat" "${SRCROOT}"
          else
            echo "warning: SwiftFormat not installed — run: brew install swiftformat"
          fi
        basedOnDependencyAnalysis: false
      - name: SwiftLint
        script: |
          SWIFTLINT=/opt/homebrew/bin/swiftlint
          if [ -f "$SWIFTLINT" ]; then
            "$SWIFTLINT" lint --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed — run: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_NAME: "MLXBits Image Studio"
        PRODUCT_BUNDLE_IDENTIFIER: com.mlxbits.image-studio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MLXBits Image StudioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: MLXBits Image Studio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlxbits.image-studio.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MLXBits Image Studio:
    build:
      targets:
        MLXBits Image Studio: all
    test:
      targets:
        - MLXBits Image StudioTests
      gatherCoverageData: true
    run:
      config: Debug
