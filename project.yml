name: MLXBits Image Studio
options:
  bundleIdPrefix: com.mlxbits
  deploymentTarget:
    macOS: "26.5"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "26.5"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    # Team only on Release so Debug builds stay unsigned/adhoc and don't
    # require a provisioning round-trip. release.sh archives Release.
    Release:
      DEVELOPMENT_TEAM: 39TQC8LANW

targets:
  MLXBits Image Studio:
    type: application
    platform: macOS
    # Explicit source dirs only — `path: .` swept build artifacts, tooling
    # configs (.swiftlint.yml/.periphery.yml/.jscpd.json), reports, logs, and
    # the built .app/.dmg into the app bundle (dotfile-blind `*.yml` excludes).
    # Info.plist + entitlements are wired via the `info:`/`entitlements:` keys.
    sources:
      - App
      - Models
      - Runner
      - Stores
      - Utilities
      - path: Views
        excludes:
          - ".swiftlint.yml"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: MLXBits Image Studio
        CFBundleIdentifier: com.mlxbits.image-studio
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "26.5"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    entitlements:
      path: Resources/MLXBits_Image_Studio.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: "MLXBits Image Studio"
        PRODUCT_BUNDLE_IDENTIFIER: com.mlxbits.image-studio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
